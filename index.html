<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mini Excel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>EXCEL</h2>

<input type="file" id="fileInput" accept=".csv">
<button id="downloadBtn">Tải file mẫu SV</button>

<!-- FORM ADD -->
<div id="formBox">
    <h3>Thêm sinh viên</h3>
    <input type="text" id="nameInput" placeholder="Tên SV">
    <input type="text" id="msvInput" placeholder="MSV">
    <input type="text" id="sttInput" placeholder="STT">
    <button id="addBtn">Add</button>
</div>

<table id="sheet"></table>

<script src="script.js"></script>

</body>
</html>
